name: Dispatch Due Alerts

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Call production cron endpoint
        env:
          CRON_ENDPOINT_URL: ${{ secrets.CRON_ENDPOINT_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_ENDPOINT_URL" ]; then
            echo "Missing CRON_ENDPOINT_URL secret"
            exit 1
          fi

          if [ -z "$CRON_SECRET" ]; then
            echo "Missing CRON_SECRET secret"
            exit 1
          fi

          curl --fail --silent --show-error \
            --header "Authorization: Bearer $CRON_SECRET" \
            "$CRON_ENDPOINT_URL"
